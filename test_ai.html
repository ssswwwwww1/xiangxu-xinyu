<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI API 测试 - 乡叙心域</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #667eea;
      margin-bottom: 10px;
    }
    .status {
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      font-weight: bold;
    }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    .test-section {
      margin: 30px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 10px;
    }
    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin: 10px 10px 10px 0;
      transition: transform 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .result {
      margin-top: 15px;
      padding: 15px;
      background: white;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .loading {
      color: #667eea;
      font-style: italic;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-top: 10px;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 5px;
      font-size: 14px;
    }
    .api-info {
      background: #fff3cd;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      border-left: 4px solid #ffc107;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🤖 DeepSeek AI API 测试</h1>
    <p style="color: #666; margin-top: 10px;">乡叙心域 - AI 数字人对话功能测试</p>
    
    <div class="api-info">
      <strong>📋 API 信息：</strong><br>
      API Key: sk-3cd442505e564999a2b11d63b974c62e<br>
      API URL: https://api.deepseek.com/v1/chat/completions<br>
      Model: deepseek-chat
    </div>
    
    <div id="status" class="status info">准备就绪，点击按钮开始测试</div>
    
    <div class="test-section">
      <h2>测试 1: 基础连接测试</h2>
      <button onclick="testBasicConnection()">测试 API 连接</button>
      <div id="result1"></div>
    </div>
    
    <div class="test-section">
      <h2>测试 2: 对话功能测试</h2>
      <button onclick="testConversation()">测试对话（我最近很焦虑）</button>
      <button onclick="testConversation2()">测试对话（这里有什么历史吗）</button>
      <div id="result2"></div>
    </div>
    
    <div class="test-section">
      <h2>测试 3: 叙事疗法风格测试</h2>
      <button onclick="testTherapy()">测试疗愈对话（感觉压力很大）</button>
      <div id="result3"></div>
    </div>
    
    <div class="test-section">
      <h2>完整对话日志</h2>
      <div id="fullLog" style="max-height: 400px; overflow-y: auto;"></div>
    </div>
  </div>
  
  <script>
    const API_KEY = 'sk-3cd442505e564999a2b11d63b974c62e';
    const API_URL = 'https://api.deepseek.com/v1/chat/completions';
    
    function updateStatus(message, type = 'info') {
      const statusEl = document.getElementById('status');
      statusEl.textContent = message;
      statusEl.className = `status ${type}`;
    }
    
    function log(message) {
      const logEl = document.getElementById('fullLog');
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML += `<div style="margin: 10px 0; padding: 10px; background: #f8f9fa; border-radius: 5px;">
        <strong>[${time}]</strong> ${message}
      </div>`;
      logEl.scrollTop = logEl.scrollHeight;
    }
    
    async function callAI(userInput, systemPrompt) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${API_KEY}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: 'deepseek-chat',
            messages: [
              { role: 'system', content: systemPrompt },
              { role: 'user', content: userInput }
            ],
            max_tokens: 200,
            temperature: 0.8,
            stream: false
          }),
          signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        return data.choices[0].message.content;
        
      } catch (error) {
        throw error;
      }
    }
    
    async function testBasicConnection() {
      const resultEl = document.getElementById('result1');
      resultEl.innerHTML = '<div class="loading">🔄 正在连接 API...</div>';
      log('开始基础连接测试');
      
      try {
        const startTime = Date.now();
        const response = await callAI('你好', '你是一个友好的 AI 助手。请用简短的中文回复。');
        const endTime = Date.now();
        
        const duration = endTime - startTime;
        resultEl.innerHTML = `
          <div class="success">✅ 连接成功！耗时：${duration}ms</div>
          <div class="result">
            <strong>AI 回复：</strong>
            <pre>${response}</pre>
          </div>
        `;
        updateStatus('API 连接测试成功', 'success');
        log(`基础连接测试成功，耗时：${duration}ms`);
        
      } catch (error) {
        resultEl.innerHTML = `
          <div class="error">❌ 连接失败：${error.message}</div>
        `;
        updateStatus('API 连接失败：' + error.message, 'error');
        log(`基础连接测试失败：${error.message}`);
      }
    }
    
    async function testConversation() {
      const resultEl = document.getElementById('result2');
      resultEl.innerHTML = '<div class="loading">🔄 正在测试对话...</div>';
      log('开始对话测试：我最近很焦虑');
      
      const systemPrompt = `你是"乡叙心域"乡村疗愈平台的 AI 数字人引导员，名叫"福宝"。
      
【你的角色定位】
- 温暖、共情、自然的疗愈师
- 善于运用叙事疗法技巧
- 结合乡村景点的文化内涵进行引导
- 避免说教，多用隐喻、故事、体验式语言
- 每次回复简短温馨（50-100 字）

【对话风格】
- 使用括号描述表情或动作，如（温和地笑）、（指向远处）
- 语言亲切自然，像朋友一样聊天
- 适当使用 emoji 表情
- 多提问，保持对话的开放性`;
      
      try {
        const startTime = Date.now();
        const response = await callAI('我最近很焦虑，工作压力好大', systemPrompt);
        const endTime = Date.now();
        
        const duration = endTime - startTime;
        resultEl.innerHTML = `
          <div class="success">✅ 对话成功！耗时：${duration}ms</div>
          <div class="result">
            <strong>用户输入：</strong>
            <pre>我最近很焦虑，工作压力好大</pre>
            <strong>AI 回复：</strong>
            <pre>${response}</pre>
          </div>
        `;
        updateStatus('对话测试成功', 'success');
        log(`对话测试成功，耗时：${duration}ms`);
        
      } catch (error) {
        resultEl.innerHTML = `
          <div class="error">❌ 对话失败：${error.message}</div>
        `;
        updateStatus('对话测试失败：' + error.message, 'error');
        log(`对话测试失败：${error.message}`);
      }
    }
    
    async function testConversation2() {
      const resultEl = document.getElementById('result2');
      resultEl.innerHTML = '<div class="loading">🔄 正在测试对话...</div>';
      log('开始对话测试：这里有什么历史吗');
      
      const systemPrompt = `你是"乡叙心域"乡村疗愈平台的 AI 数字人引导员，名叫"福宝"。
当前游客位于：状元井。
      
【你的角色定位】
- 温暖、共情、自然的疗愈师
- 善于运用叙事疗法技巧
- 结合乡村景点的文化内涵进行引导
- 避免说教，多用隐喻、故事、体验式语言
- 每次回复简短温馨（50-100 字）

【对话风格】
- 使用括号描述表情或动作
- 语言亲切自然，像朋友一样聊天
- 适当使用 emoji 表情
- 多提问，保持对话的开放性`;
      
      try {
        const startTime = Date.now();
        const response = await callAI('这里有什么历史吗？', systemPrompt);
        const endTime = Date.now();
        
        const duration = endTime - startTime;
        resultEl.innerHTML = `
          <div class="success">✅ 对话成功！耗时：${duration}ms</div>
          <div class="result">
            <strong>用户输入：</strong>
            <pre>这里有什么历史吗？</pre>
            <strong>AI 回复：</strong>
            <pre>${response}</pre>
          </div>
        `;
        updateStatus('对话测试成功', 'success');
        log(`对话测试 2 成功，耗时：${duration}ms`);
        
      } catch (error) {
        resultEl.innerHTML = `
          <div class="error">❌ 对话失败：${error.message}</div>
        `;
        updateStatus('对话测试失败：' + error.message, 'error');
        log(`对话测试 2 失败：${error.message}`);
      }
    }
    
    async function testTherapy() {
      const resultEl = document.getElementById('result3');
      resultEl.innerHTML = '<div class="loading">🔄 正在测试疗愈对话...</div>';
      log('开始疗愈对话测试：感觉压力很大');
      
      const systemPrompt = `你是"乡叙心域"乡村疗愈平台的 AI 数字人引导员，名叫"福宝"。
当前游客位于：舞龙广场。
      
【你的角色定位】
- 温暖、共情、自然的疗愈师
- 善于运用叙事疗法技巧（外化问题、寻找独特结果、重构故事）
- 结合乡村景点的文化内涵进行引导
- 避免说教，多用隐喻、故事、体验式语言
- 每次回复简短温馨（50-100 字）

【对话风格】
- 使用括号描述表情或动作
- 语言亲切自然，像朋友一样聊天
- 适当使用 emoji 表情
- 多提问，保持对话的开放性`;
      
      try {
        const startTime = Date.now();
        const response = await callAI('我感觉压力好大，快要承受不住了', systemPrompt);
        const endTime = Date.now();
        
        const duration = endTime - startTime;
        resultEl.innerHTML = `
          <div class="success">✅ 疗愈对话成功！耗时：${duration}ms</div>
          <div class="result">
            <strong>用户输入：</strong>
            <pre>我感觉压力好大，快要承受不住了</pre>
            <strong>AI 回复：</strong>
            <pre>${response}</pre>
          </div>
        `;
        updateStatus('疗愈对话测试成功', 'success');
        log(`疗愈对话测试成功，耗时：${duration}ms`);
        
      } catch (error) {
        resultEl.innerHTML = `
          <div class="error">❌ 疗愈对话失败：${error.message}</div>
        `;
        updateStatus('疗愈对话测试失败：' + error.message, 'error');
        log(`疗愈对话测试失败：${error.message}`);
      }
    }
    
    // 自动记录日志
    log('测试页面已加载');
    log(`API Key: ${API_KEY.substring(0, 15)}...`);
    log(`API URL: ${API_URL}`);
  </script>
</body>
</html>
